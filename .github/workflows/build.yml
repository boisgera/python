name: build

on:
  push:
    branches:
      - master

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install project Dependencies
        run: bun install

      - name: Patch astro config
        run: bun patch-astro-config.js

      - name: Build
        run: bun run build

      - name: Deployment Setup
        run: |
          rm -rf .gitignore
          cd dist && touch .nojekyll

      - name: Deployment
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: "dist"
          single-commit: true
          clean: true
